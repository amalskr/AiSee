name: Build & Distribute APK

on:
  push:
    branches:
      - development

jobs:
  build:
    name: Lint, Test, Build & Distribute
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read release notes
        id: release_notes
        run: |
          VERSION="1.0.${{ github.run_number }}"
          HEADER="Internal Test Release v${{ github.run_number }} ($VERSION)"
          BODY=$(cat RELEASE_NOTES.md)
          NOTES="$HEADER
          $BODY"
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create keystore.properties
        run: |
          echo "storeFile=${{ github.workspace }}/app/keystore/aisee-key.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Decode keystore
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore/aisee-key.jks

      - name: Run lint
        run: ./gradlew lintProdRelease

      - name: Build prod release APK
        run: ./gradlew assembleProdRelease -PVERSION_CODE=${{ github.run_number }} -PVERSION_NAME=1.0.${{ github.run_number }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: aisee-internal
          releaseNotes: ${{ steps.release_notes.outputs.notes }}
          file: app/build/outputs/apk/prod/release/app-prod-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiSee-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/prod/release/app-prod-release.apk

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "AiSee Android - New Build Available"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Version:*\n1.0.${{ github.run_number }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Release Notes:*\n${{ steps.release_notes.outputs.notes }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "Download from Firebase" },
                      "url": "https://appdistribution.firebase.google.com/testerapps/org.aisee.app",
                      "style": "primary"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Build" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
